<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="index.css">
    <title>Search Bar</title>
</head>

<body>
    <div id="container" x-data="searchApp()">
        <input
            autofocus
            placeholder="页面内搜索"
            x-model="text"
            @input="handleInput"
            @keydown="handleKey"
        />
        <div class="buttons">
            <button @click="searchPrev()">
                <iconify-icon icon="lucide:chevron-up"></iconify-icon>
            </button>
            <button @click="searchNext()">
                <iconify-icon icon="lucide:chevron-down"></iconify-icon>
            </button>
        </div>
        <span class="indicator" x-text="indicatorText"></span>
    </div>

    <script type="module" src="main.js"></script>
</body>

</html>
